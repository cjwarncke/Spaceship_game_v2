<!DOCTYPE html>
<html>
<head>
  <title>Space Blasters</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column; /* Stack items vertically */
      font-family: Arial, sans-serif;
      background-color: black;
    }

    h1 {
      color: white; /* Title text color */
      font-size: 48px; /* Title font size */
      margin-top: 20px; /* Add some space at the top */
      margin-bottom: 50px; /* Add space between the title and the next section */
      font-family: 'Lucida Console', Monaco, monospace;
    }

    #scoreboard {
      display: flex;
      justify-content: space-between;
      width: 800px; /* Same width as the canvas */
      margin-bottom: 10px;
      font-size: 18px;
      color: white;
      font-family: 'Lucida Console', Monaco, monospace;
      white-space: nowrap;
    }

    canvas {
      background-color: black;
      border: 1px solid white;
    }
  </style>
</head>
<body>
    <h1>Space Blasters</h1>

  <div id="scoreboard"></div>

  <canvas id="canvas" width="800" height="500"></canvas>

  <script src="game.js"></script>

  <div id="chat-container" style="
    position: fixed;
    bottom: 10px;
    right: 10px;
    width: 300px;
    background-color: rgba(0,0,0,0.7);
    color: white;
    padding: 10px;
    border-radius: 5px;
    font-family: Arial, sans-serif;
    z-index: 1000;
">
    <div id="chatbox" style="
        height: 150px;
        overflow-y: auto;
        margin-bottom: 8px;
        font-size: 14px;
    "></div>

    <input id="chat-input" type="text" placeholder="Type your message..." style="
        width: calc(100% - 60px);
        margin-right: 4px;
        padding: 6px;
        border: none;
        border-radius: 3px;
        font-size: 14px;
    " />

    <button id="chat-send" style="
        width: 50px;
        padding: 6px;
        border: none;
        border-radius: 3px;
        background-color: #4CAF50;
        color: white;
        font-weight: bold;
        cursor: pointer;
        font-size: 14px;
    ">Send</button>
</div>

</body>
</html>
