<!DOCTYPE html>
<html>
<head>
    <title>Instructions</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body style="text-align:center; margin-top:100px; background-color:#000; color:white;">
    <div style="display: inline-block; text-align: left">
        <h1 style="text-align: center;">Space Blasters</h1>
        <h2 style="text-align: center;">Instructions</h2>
        <h3>Battle your friends in this exciting shooting game</h3>
        <p><strong>L</strong> to rotate your ship clockwise</p>
        <p><strong>J</strong> to rotate your ship counterclockwise</p>
        <p><strong>F</strong> to fire the thrusters</p>
        <p><strong>Space</strong> to shoot a laser</p>
        <p style="color: yellow; font-size: 20;">NEW: Use mouse to shoot (Allows for faster shooting, but requires some practice)</p>

        <div>
            <button onclick="goToMoreInfo()">More Info</button>
        </div>
        <br><br>
        <button onclick="goToLogin()">Go Back</button>
        <button onclick="goToGame()">Play Game</button>
    </div>

    <script>
        function getQueryParam(name) {
            const params = new URLSearchParams(window.location.search);
            return params.get(name);
        }

        const playerName = getQueryParam("name") || "Player";
        document.getElementById("player-name").textContent = playerName;

        function goToGame() {
            const encodedName = encodeURIComponent(playerName);
            window.location.href = `game.html?name=${encodedName}`;
        }

        function goToLogin() {
            window.location.href = "login.html";
        }

        function goToMoreInfo() {
            window.location.href = "moreinfo.html";
        }
    </script>
</body>
</html>
